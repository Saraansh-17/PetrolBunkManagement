server:
  port: 8080
  error:
    include-message: always

# Downstream base URLs (override per environment)
gateway:
  downstream:
    fuel: http://localhost:3001
    inventory: http://localhost:3002
    hr: http://localhost:3003
    auth: http://localhost:8082
  security:
    # Must match HR service `gateway.trust.token` so only the gateway can inject user headers.
    internal-token: ${GATEWAY_INTERNAL_TOKEN:}
  rate-limit:
    enabled: ${GATEWAY_RATE_LIMIT_ENABLED:true}
    requests-per-minute: 100

jwt:
  secret: ${JWT_SECRET:change-me-use-at-least-32-bytes-secret-key-for-hs256!!}
  issuer: ${JWT_ISSUER:petrol-pump-auth}

spring:
  application:
    name: petrol-pump-api-gateway
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${gateway.downstream.auth}
          predicates:
            - Path=/auth/**
        - id: hr-employees
          uri: ${gateway.downstream.hr}
          predicates:
            - Path=/employees/**
        - id: hr-attendance
          uri: ${gateway.downstream.hr}
          predicates:
            - Path=/attendance/**
        - id: fuel-service
          uri: ${gateway.downstream.fuel}
          predicates:
            - Path=/fuel/**
        - id: inventory-service
          uri: ${gateway.downstream.inventory}
          predicates:
            - Path=/inventory/**
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowed-origin-patterns:
              - "*"
            allowed-methods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowed-headers: "*"
            max-age: 3600

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: when_authorized
  health:
    defaults:
      enabled: true

logging:
  level:
    root: INFO
    com.petrolpump.gateway: INFO
