server:
  port: 8080
  error:
    include-message: always

spring:
  application:
    name: petrol-pump-api-gateway

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}

  cloud:
    gateway:
      routes:

        # =========================
        # AUTH SERVICE
        # =========================
        - id: auth-service
          uri: ${gateway.downstream.auth}
          predicates:
            - Path=/auth/**

        # =========================
        # HR SERVICE
        # =========================
        - id: hr-service
          uri: ${gateway.downstream.hr}
          predicates:
            - Path=/hr/**,/attendance/**

        # =========================
        # FUEL SERVICE
        # =========================
        - id: fuel-service
          uri: ${gateway.downstream.fuel}
          predicates:
            - Path=/api/v1/fuel/**

        # =========================
        # INVENTORY SERVICE
        # =========================
        - id: inventory-service
          uri: ${gateway.downstream.inventory}
          predicates:
            - Path=/api/v1/inventory/**

      globalcors:
        add-to-simple-url-handler-mapping: true

        cors-configurations:
          '[/**]':
            allowed-origin-patterns:
              - http://localhost:5173
              - http://localhost:3000

            allowed-methods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS

            allowed-headers: "*"
            allow-credentials: true
            max-age: 3600

gateway:
  downstream:
    fuel: http://localhost:3001
    inventory: http://localhost:3002
    hr: http://localhost:3003
    auth: http://localhost:8082

  security:
    internal-token: ${GATEWAY_INTERNAL_TOKEN:dev-gateway-internal-token-change-in-production}

  cookie:
    access-token-name: access_token

  rate-limit:
    enabled: ${GATEWAY_RATE_LIMIT_ENABLED:true}
    requests-per-minute: 100

jwt:
  secret: ${JWT_SECRET:dev-jwt-secret-must-be-at-least-32-bytes-long!!}
  issuer: ${JWT_ISSUER:petrol-pump-auth}

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: DEBUG
    com.petrolpump.gateway: DEBUG