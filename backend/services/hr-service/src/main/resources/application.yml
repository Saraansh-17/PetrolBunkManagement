spring:
  application:
    name: hr-service

  datasource:
    url: jdbc:mysql://localhost:3306/hr_service_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${HR_DB_USERNAME:root}
    password: ${HR_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  sql:
    init:
      mode: always

server:
  port: 3003

gateway:
  trust:
    enabled: ${GATEWAY_TRUST_ENABLED:false}
    token: ${GATEWAY_INTERNAL_TOKEN:}
