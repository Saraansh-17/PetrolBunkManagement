server:
  port: 8082

spring:
  application:
    name: auth-service
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: jdbc:mysql://${AUTH_DB_HOST:localhost}:${AUTH_DB_PORT:3306}/${AUTH_DB_NAME:auth_service_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${AUTH_DB_USERNAME:root}
    password: ${AUTH_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: UTC

# JWT signing — MUST be overridden in production via environment (min 256 bits for HS256)
jwt:
  secret: ${JWT_SECRET:change-me-use-at-least-32-bytes-secret-key-for-hs256!!}
  issuer: ${JWT_ISSUER:petrol-pump-auth}
  access-token-minutes: ${JWT_ACCESS_MINUTES:15}
  refresh-token-days: ${JWT_REFRESH_DAYS:7}

logging:
  level:
    root: INFO
    com.assignment.auth_service: INFO
