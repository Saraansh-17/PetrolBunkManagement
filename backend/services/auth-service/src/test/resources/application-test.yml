spring:
  datasource:
    url: jdbc:h2:mem:auth_test;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

jwt:
  secret: test-secret-key-at-least-32-bytes-long-for-jwt-hs256
  issuer: test-issuer
